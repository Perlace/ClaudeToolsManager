appId: fr.creebs.claude-tools-manager
productName: Claude Tools Manager
copyright: Copyright © 2025 Creebs

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Claude Tools Manager

mac:
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  darkModeSupport: true
  hardenedRuntime: true
  entitlements: null
  entitlementsInherit: null

dmg:
  title: Claude Tools Manager
  iconSize: 128
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

linux:
  icon: resources/icon.png
  category: Development
  description: Gestionnaire d'outils Claude Code — 50+ outils en 8 catégories
  maintainer: Creebs <contact@creebs.fr>
  vendor: Creebs
  synopsis: Claude Code tools manager
  desktop:
    Keywords: claude;ai;tools;code;anthropic;
    StartupWMClass: claude-tools-manager
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64

publish:
  provider: github
  owner: Perlace
  repo: ClaudeToolsManager
