appId: fr.creebs.claude-tools-manager
productName: Claude Tools Manager
copyright: Copyright © 2024 Creebs

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*

icon: resources/icon

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  darkModeSupport: true

dmg:
  title: Claude Tools Manager
  iconSize: 128
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  category: Development

publish:
  provider: github
  owner: creebs
  repo: claude-tools-manager
